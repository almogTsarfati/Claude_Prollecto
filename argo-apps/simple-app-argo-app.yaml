apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: simple-app
spec:
  destination:
    namespace: default
    server: https://kubernetes.default.svc
  source:
    path: helm/simple-app
    repoURL: https://github.com/almogTsarfati/Claude_Prollecto
    targetRevision: HEAD
    helm:
      valueFiles:
        - values.yaml
  sources: []
  project: default
