apiVersion: apps/v1
kind: Deployment
metadata:
  name: simple-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: simple-app
  template:
    metadata:
      labels:
        app: simple-app
    spec:
      initContainers:
      - name: setup
        image: node:18-alpine
        command:
        - sh
        - -c
        - |
          cp /config/app.js /app/app.js
          cp /config/package.json /app/package.json
          cd /app && npm install
        volumeMounts:
        - name: config
          mountPath: /config
        - name: app-dir
          mountPath: /app
      containers:
      - name: simple-app
        image: node:18-alpine
        command: ["node", "/app/app.js"]
        ports:
        - containerPort: 3000
        readinessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 5
          periodSeconds: 5
        livenessProbe:
          httpGet:
            path: /
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 10
        volumeMounts:
        - name: app-dir
          mountPath: /app
      volumes:
      - name: config
        configMap:
          name: app-config
      - name: app-dir
        emptyDir: {}
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  app.js: |
    const express = require('express');
    const app = express();
    const port = process.env.PORT || 3000;

    app.get('/', (req, res) => {
      res.send('hello from eks bro');
    });

    app.get('/health', (req, res) => {
      res.status(200).send('OK');
    });

    app.listen(port, () => {
      console.log(`App listening on port ${port}`);
    });
  package.json: |
    {
      "name": "simple-app",
      "version": "1.0.0",
      "dependencies": {
        "express": "^4.18.0"
      }
    }
---
apiVersion: v1
kind: Service
metadata:
  name: simple-app-service
spec:
  selector:
    app: simple-app
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
  type: LoadBalancer